<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="Lorentz, the DevOpsRollbackAgent">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#16243b"/>
      <stop offset="100%" stop-color="#05080f"/>
    </radialGradient>
    <linearGradient id="suit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1f26"/>
      <stop offset="100%" stop-color="#0a0c10"/>
    </linearGradient>
    <radialGradient id="ball" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ffe27a"/>
      <stop offset="100%" stop-color="#f5a800"/>
    </radialGradient>
  </defs>

  <!-- backdrop -->
  <circle cx="160" cy="160" r="160" fill="url(#bg)"/>

  <!-- antenna -->
  <line x1="160" y1="70" x2="160" y2="34" stroke="#c9c9c9" stroke-width="3"/>
  <circle cx="160" cy="28" r="10" fill="url(#ball)"/>
  <circle cx="156" cy="24" r="3" fill="#fff7d6" opacity="0.85"/>

  <!-- suit / shoulders -->
  <path d="M70 320 V250 q90 -38 180 0 V320 Z" fill="url(#suit)"/>
  <path d="M160 232 l34 22 -34 30 -34 -30 Z" fill="#0b69c4"/>

  <!-- MCP badge -->
  <rect x="138" y="236" width="44" height="22" rx="5" fill="#f5a800"/>
  <text x="160" y="251" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#1a1300">MCP</text>

  <!-- fluffy head: overlapping puffs -->
  <g fill="#f7f5ee">
    <circle cx="160" cy="92" r="34"/>
    <circle cx="120" cy="108" r="34"/>
    <circle cx="200" cy="108" r="34"/>
    <circle cx="98" cy="140" r="32"/>
    <circle cx="222" cy="140" r="32"/>
    <circle cx="92" cy="176" r="30"/>
    <circle cx="228" cy="176" r="30"/>
    <circle cx="112" cy="205" r="30"/>
    <circle cx="208" cy="205" r="30"/>
    <circle cx="160" cy="150" r="56"/>
    <circle cx="160" cy="205" r="40"/>
  </g>

  <!-- face -->
  <g>
    <!-- eyes -->
    <ellipse cx="134" cy="150" rx="11" ry="13" fill="#1a1a1a"/>
    <ellipse cx="186" cy="150" rx="11" ry="13" fill="#1a1a1a"/>
    <circle cx="138" cy="145" r="3.2" fill="#ffffff"/>
    <circle cx="190" cy="145" r="3.2" fill="#ffffff"/>

    <!-- nose -->
    <ellipse cx="160" cy="182" rx="12" ry="9" fill="#1a1a1a"/>
    <ellipse cx="156" cy="179" rx="3" ry="2" fill="#4a4a4a"/>

    <!-- muzzle / mouth -->
    <path d="M160 191 q0 12 -11 15 M160 191 q0 12 11 15" stroke="#cfcabb" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="160" cy="210" rx="5" ry="3.5" fill="#e98aa0"/>
  </g>
</svg>
