name: CI

on:
  push:
    branches: [main, 'step-*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build (.NET 10)

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        # No-ops cleanly when the solution contains no test projects.
        # The demo/shop-api-seed/tests/ShopApi.Tests suite is intentionally
        # outside the main .sln — it ships with the seed script, not the demo build.
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Verify Function packs
        run: dotnet publish src/DeploymentMcp/DeploymentMcp.csproj -c Release -o ./out/func
